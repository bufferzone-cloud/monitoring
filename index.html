<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Driver Monitoring · Login</title>
  <!-- PWA Meta & Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3d2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Driver Monitor">
  <!-- Icons & Fonts -->
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* CARD */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 32px;
      padding: 40px 26px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.02);
      text-align: center;
      overflow: hidden;
      border: 1px solid #e8f0ea;
    }

    /* LOGO */
    .logo {
      margin-bottom: 20px;
    }
    .logo img {
      max-width: 150px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* HEADER */
    h1 {
      font-size: 28px;
      color: #0f3d2e;
      margin-bottom: 8px;
    }

    .subhead {
      color: #5a7c70;
      margin-bottom: 30px;
    }

    /* INSTALL BANNER */
    .install-banner {
      background: #0f3d2e;
      color: white;
      padding: 14px;
      border-radius: 50px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(15,61,46,0.2);
    }
    .install-banner i {
      font-size: 18px;
    }

    /* LOGIN BUTTON (FADE IN) */
    .tap-login {
      background: #0f3d2e;
      color: white;
      padding: 16px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* DROPDOWN FORM */
    .login-dropdown {
      max-height: 0;
      overflow: hidden;
      transition: all 0.5s ease;
    }
    .login-dropdown.active {
      max-height: 300px;
      margin-top: 20px;
    }

    /* INPUTS */
    .input-group {
      background: #f4f8f6;
      border-radius: 50px;
      padding: 10px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
    }
    .input-group i {
      color: #7aa395;
      margin-right: 10px;
    }
    .input-group input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 10px 0;
    }

    /* LOGIN BUTTON */
    .login-btn {
      width: 100%;
      background: #0f3d2e;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ERROR */
    .error-msg {
      color: #b91c1c;
      margin-top: 10px;
      font-size: 14px;
    }

    /* iOS install instructions */
    .ios-install-tip {
      background: #f0f7f0;
      border-radius: 30px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #0f3d2e;
      display: none;
    }
    .ios-install-tip i {
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="login-card">

  <!-- Large Logo -->
  <div class="logo">
    <img src="logo.png" alt="Driver Monitor Logo">
  </div>

  <h1>Welcome</h1>
  <div class="subhead">Driver Monitoring System</div>

  <!-- Install Button / Banner -->
  <div class="install-banner" id="installBanner">
    <i class="fas fa-download"></i>
    <span>Install App</span>
  </div>
  <!-- iOS manual install guide -->
  <div class="ios-install-tip" id="iosInstallTip">
    <i class="fas fa-share-square"></i> Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong>
  </div>

  <div class="tap-login" id="tapLoginBtn">
    Tap to Login
  </div>

  <div class="login-dropdown" id="loginDropdown">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="emailInput" placeholder="Email" value="admin@monitoring.com">
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="passwordInput" placeholder="Password" value="123456">
    </div>
    <button class="login-btn" id="loginSubmit">Login</button>
    <div class="error-msg" id="loginError"></div>
  </div>

</div>

<script>
  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registered', reg))
      .catch(err => console.log('SW registration failed', err));
  }

  // PWA Install Prompt Logic
  let deferredPrompt;
  const installBanner = document.getElementById('installBanner');
  const iosTip = document.getElementById('iosInstallTip');

  // Detect if already in standalone mode (installed)
  function isPWAInstalled() {
    return window.matchMedia('(display-mode: standalone)').matches || 
           window.navigator.standalone || 
           document.referrer.includes('android-app://');
  }

  // Show install UI if not installed
  if (!isPWAInstalled()) {
    // For iOS (no beforeinstallprompt)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS && !isPWAInstalled()) {
      iosTip.style.display = 'block';
    }
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isPWAInstalled()) {
      installBanner.style.display = 'flex';
    }
  });

  installBanner.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installBanner.style.display = 'none';
      iosTip.style.display = 'none';
    }
    deferredPrompt = null;
  });

  // Hide install UI if app gets installed later
  window.addEventListener('appinstalled', () => {
    installBanner.style.display = 'none';
    iosTip.style.display = 'none';
  });

  // Dropdown animation
  document.getElementById('tapLoginBtn').addEventListener('click', () => {
    document.getElementById('loginDropdown').classList.toggle('active');
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
    authDomain: "monitoring-1a105.firebaseapp.com",
    databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
    projectId: "monitoring-1a105",
    storageBucket: "monitoring-1a105.firebasestorage.app",
    messagingSenderId: "1095363656731",
    appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe",
    measurementId: "G-2CJHNPR6YZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('loginSubmit').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = '';

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const user = userCred.user;

      if (user.email.startsWith('admin@')) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'driver.html';
      }
    } catch (e) {
      errorDiv.textContent = 'Login failed: ' + e.message;
    }
  });
</script>
</body>
</html>
