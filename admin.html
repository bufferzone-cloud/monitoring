<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Admin · Driver Daily Monitoring</title>
  <!-- Font Awesome (dark green icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Routing Machine (for direction) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    #app {
      max-width: 450px;
      width: 100%;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.02);
    }

    /* ----- Map Section (70% height) ----- */
    #mapContainer {
      height: 70vh;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ----- Bottom Panel (30%) ----- */
    #bottomPanel {
      flex: 1;
      background: #ffffff;
      border-top: 1px solid #e0e8e0;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 80px;
      overflow-y: auto;
    }

    /* Four square action buttons */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .action-btn {
      background: #ffffff;
      border: 1.5px solid #2e5c3e; /* dark green border */
      border-radius: 16px;
      padding: 12px 4px;
      text-align: center;
      color: #2e5c3e;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn i {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
      color: #2e5c3e;
    }

    .action-btn.active {
      background: #2e5c3e;
      color: white;
    }
    .action-btn.active i {
      color: white;
    }

    /* Driver list (closest to admin) */
    .driver-list-title {
      font-weight: 700;
      color: #1a3a2a;
      margin: 8px 0 10px;
    }

    .driver-item {
      background: #f8fbf8;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-left: 5px solid #2e5c3e;
      cursor: pointer;
    }

    .driver-name {
      font-weight: 700;
      color: #1e3a2a;
    }

    .driver-car {
      font-size: 14px;
      color: #3a6b4a;
    }

    .driver-location {
      font-size: 13px;
      color: #5a7a62;
      margin-top: 4px;
    }

    /* ----- Page Views (full screen overlays) ----- */
    .page-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 100;
      overflow-y: auto;
      padding: 20px 16px 90px;
      display: none;
    }

    .page-view.active {
      display: block;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #2e5c3e;
      cursor: pointer;
    }

    h2 {
      color: #1e3a2a;
      font-weight: 700;
    }

    /* Green pill button */
    .green-pill-btn {
      background: #2e5c3e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin-bottom: 16px;
    }

    /* Dropdown form */
    .dropdown-form {
      background: #f4f9f4;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 30px;
      border: 1px solid #cbdcd0;
      margin-bottom: 12px;
      font-size: 15px;
      background: white;
    }

    /* Cards */
    .card-item {
      background: #f8fbf8;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #d0e0d0;
    }

    /* Modal popup */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-card {
      background: white;
      border-radius: 32px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
    }

    /* Table for reports */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }
    .report-table th, .report-table td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #d0e0d0;
    }

    .download-csv {
      background: #2e5c3e;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 20px;
      margin-top: 16px;
      cursor: pointer;
    }

    /* Utilities */
    .text-green { color: #2e5c3e; }
    .bg-green { background: #2e5c3e; color: white; }
  </style>
</head>
<body>
<div id="app">
  <!-- MAP (70%) -->
  <div id="mapContainer"></div>

  <!-- BOTTOM PANEL (30%) -->
  <div id="bottomPanel">
    <div class="action-grid">
      <div class="action-btn" data-page="drivers"><i class="fas fa-users"></i><span>Drivers</span></div>
      <div class="action-btn" data-page="cars"><i class="fas fa-car"></i><span>Cars</span></div>
      <div class="action-btn" data-page="assignments"><i class="fas fa-exchange-alt"></i><span>Assign</span></div>
      <div class="action-btn" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></div>
    </div>
    <div class="driver-list-title">🚗 Drivers closest to you</div>
    <div id="driverProximityList"></div>
  </div>

  <!-- ========== PAGE VIEWS ========== -->

  <!-- DRIVERS PAGE -->
  <div id="driversPage" class="page-view">
    <div class="page-header">
      <button class="back-btn" onclick="closePageView()"><i class="fas fa-arrow-left"></i></button>
      <h2>Drivers</h2>
    </div>
    <button class="green-pill-btn" id="toggleCreateDriverForm"><i class="fas fa-plus-circle"></i> Create Driver</button>
    <div id="createDriverForm" class="dropdown-form">
      <input class="form-input" id="driverFirstName" placeholder="First Name">
      <input class="form-input" id="driverLastName" placeholder="Last Name">
      <input class="form-input" id="driverNRC" placeholder="NRC">
      <input class="form-input" id="driverEmail" placeholder="Email">
      <input class="form-input" id="driverPhone" placeholder="Phone Number">
      <input class="form-input" id="driverPassword" type="password" placeholder="Password">
      <input class="form-input" id="driverConfirmPassword" type="password" placeholder="Confirm Password">
      <button class="green-pill-btn" id="createDriverBtn">Create Account</button>
    </div>
    <input class="form-input" id="searchDriverInput" placeholder="Search driver...">
    <div id="driversListContainer"></div>
  </div>

  <!-- CARS PAGE -->
  <div id="carsPage" class="page-view">
    <div class="page-header">
      <button class="back-btn" onclick="closePageView()"><i class="fas fa-arrow-left"></i></button>
      <h2>Cars / Vehicles</h2>
    </div>
    <button class="green-pill-btn" id="toggleAddCarForm"><i class="fas fa-plus-circle"></i> Add Vehicle</button>
    <div id="addCarForm" class="dropdown-form">
      <input class="form-input" id="carName" placeholder="Vehicle Name (e.g. Avanza)">
      <input class="form-input" id="carPlate" placeholder="Number Plate">
      <button class="green-pill-btn" id="addCarBtn">Add Vehicle</button>
    </div>
    <div id="carsListContainer"></div>
  </div>

  <!-- ASSIGNMENTS PAGE -->
  <div id="assignmentsPage" class="page-view">
    <div class="page-header">
      <button class="back-btn" onclick="closePageView()"><i class="fas fa-arrow-left"></i></button>
      <h2>Assignments</h2>
    </div>
    <p style="margin-bottom:16px;">Assign car to driver / suspend</p>
    <div id="assignmentsContainer"></div>
  </div>

  <!-- REPORTS PAGE -->
  <div id="reportsPage" class="page-view">
    <div class="page-header">
      <button class="back-btn" onclick="closePageView()"><i class="fas fa-arrow-left"></i></button>
      <h2>Reports</h2>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;">
      <select id="reportTypeSelect" class="form-input" style="width:auto; flex:1;">
        <option value="driver">Driver Reports</option>
        <option value="car">Car Reports</option>
        <option value="fuel">Fuel Reports</option>
        <option value="full">Full Report</option>
      </select>
      <select id="reportPeriodSelect" class="form-input" style="width:auto;">
        <option value="today">Today</option>
        <option value="daily">Select Day</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <button class="green-pill-btn" id="loadReportBtn">Load Report</button>
    <div id="reportTableContainer"></div>
    <button class="download-csv" id="downloadReportCsv"><i class="fas fa-download"></i> Download CSV</button>
  </div>
</div>

<!-- MODAL POPUP (for driver/car details) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalContent"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
    authDomain: "monitoring-1a105.firebaseapp.com",
    databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
    projectId: "monitoring-1a105",
    storageBucket: "monitoring-1a105.firebasestorage.app",
    messagingSenderId: "1095363656731",
    appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Protect route
  onAuthStateChanged(auth, (user) => {
    if (!user || !user.email.startsWith('admin@')) {
      window.location.href = 'index.html';
    }
  });

  // Global state
  let map;
  let adminLocation = { lat: -6.2088, lng: 106.8456 }; // default Jakarta
  let drivers = [];
  let cars = [];
  let assignments = [];

  // Initialize Leaflet map (70% height)
  function initMap() {
    map = L.map('mapContainer').setView([adminLocation.lat, adminLocation.lng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    // Try to get admin's real location
    navigator.geolocation?.getCurrentPosition(pos => {
      adminLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setView([adminLocation.lat, adminLocation.lng], 15);
      L.marker([adminLocation.lat, adminLocation.lng]).addTo(map).bindPopup('You (Admin)').openPopup();
      updateDriverProximityList();
    });
  }

  // Fetch data
  function loadData() {
    onValue(ref(db, 'drivers'), snap => {
      drivers = snap.val() ? Object.entries(snap.val()).map(([id, d]) => ({ id, ...d })) : [];
      updateDriverProximityList();
      renderDriversPage();
      renderAssignments();
    });
    onValue(ref(db, 'cars'), snap => {
      cars = snap.val() ? Object.entries(snap.val()).map(([id, c]) => ({ id, ...c })) : [];
      renderCarsPage();
      renderAssignments();
    });
    onValue(ref(db, 'assignments'), snap => {
      assignments = snap.val() ? Object.entries(snap.val()).map(([id, a]) => ({ id, ...a })) : [];
    });
  }

  // Calculate distance and sort drivers closest to admin
  function updateDriverProximityList() {
    const listDiv = document.getElementById('driverProximityList');
    const withCoords = drivers.filter(d => d.lat && d.lng);
    withCoords.sort((a, b) => {
      const distA = getDistance(adminLocation.lat, adminLocation.lng, a.lat, a.lng);
      const distB = getDistance(adminLocation.lat, adminLocation.lng, b.lat, b.lng);
      return distA - distB;
    });
    listDiv.innerHTML = withCoords.slice(0, 5).map(d => {
      const assignedCar = cars.find(c => c.assignedDriver === d.id);
      return `
        <div class="driver-item" onclick="showDriverDetails('${d.id}')">
          <div class="driver-name">${d.firstName} ${d.lastName}</div>
          <div class="driver-car">${assignedCar ? assignedCar.name + ' (' + assignedCar.plate + ')' : 'No car assigned'}</div>
          <div class="driver-location"><i class="fas fa-map-pin"></i> ${d.road || 'Unknown'}, ${d.city || ''}</div>
        </div>
      `;
    }).join('');
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // Render drivers list in Drivers page
  function renderDriversPage() {
    const cont = document.getElementById('driversListContainer');
    cont.innerHTML = drivers.map(d => `
      <div class="card-item" onclick="showDriverDetails('${d.id}')">
        <strong>${d.firstName} ${d.lastName}</strong><br>
        ${d.email} · ${d.phone || ''}<br>
        <span class="text-green">NRC: ${d.nrc || ''}</span>
      </div>
    `).join('');
  }

  // Show driver details modal (with track & report)
  window.showDriverDetails = function(driverId) {
    const driver = drivers.find(d => d.id === driverId);
    const assignedCar = cars.find(c => c.assignedDriver === driverId);
    const modal = document.getElementById('modalOverlay');
    document.getElementById('modalContent').innerHTML = `
      <h3>${driver.firstName} ${driver.lastName}</h3>
      <p>📧 ${driver.email} | 📞 ${driver.phone || 'N/A'}</p>
      <p>🚗 Car: ${assignedCar ? assignedCar.name + ' (' + assignedCar.plate + ')' : 'None'}</p>
      <button class="green-pill-btn" onclick="trackDriver('${driverId}')"><i class="fas fa-location-dot"></i> Track</button>
      <button class="green-pill-btn" onclick="showDriverReports('${driverId}')"><i class="fas fa-file-alt"></i> Reports</button>
      <button style="background:transparent; border:none; margin-top:10px;" onclick="document.getElementById('modalOverlay').style.display='none'">Close</button>
    `;
    modal.style.display = 'flex';
  };

  window.trackDriver = function(driverId) {
    const driver = drivers.find(d => d.id === driverId);
    if (driver.lat && driver.lng) {
      closePageView();
      map.setView([driver.lat, driver.lng], 18);
      L.marker([driver.lat, driver.lng]).addTo(map).bindPopup(`${driver.firstName}`).openPopup();
      document.getElementById('modalOverlay').style.display = 'none';
    } else { alert('Driver location not available'); }
  };

  window.showDriverReports = function(driverId) {
    // Fetch reports from Firebase and show in modal
    get(child(ref(db), `driverReports/${driverId}`)).then(snap => {
      const reports = snap.val() ? Object.values(snap.val()) : [];
      let html = `<h4>Daily Reports</h4>`;
      reports.forEach(r => {
        html += `<p>${r.date}: Start ${r.startFuel}L, End ${r.endFuel}L, Dist ${r.distance}km, Revenue ${r.revenue}</p>`;
      });
      document.getElementById('modalContent').innerHTML = html + `<button onclick="document.getElementById('modalOverlay').style.display='none'">Close</button>`;
    });
  };

  // Cars page
  function renderCarsPage() {
    const cont = document.getElementById('carsListContainer');
    cont.innerHTML = cars.map(c => {
      const driver = drivers.find(d => d.id === c.assignedDriver);
      return `
        <div class="card-item" onclick="showCarDetails('${c.id}')">
          <strong>${c.name}</strong> (${c.plate})<br>
          <span>Assigned: ${driver ? driver.firstName : 'None'}</span>
        </div>
      `;
    }).join('');
  }

  window.showCarDetails = function(carId) {
    const car = cars.find(c => c.id === carId);
    const driver = drivers.find(d => d.id === car.assignedDriver);
    document.getElementById('modalContent').innerHTML = `
      <h3>${car.name} (${car.plate})</h3>
      <p>Assigned driver: ${driver ? driver.firstName : 'None'}</p>
      <p>Fuel consumed: ${car.totalFuelConsumed || 0} L</p>
      <p>Distance: ${car.totalDistance || 0} km</p>
      <button onclick="document.getElementById('modalOverlay').style.display='none'">Close</button>
    `;
    document.getElementById('modalOverlay').style.display = 'flex';
  };

  // Assignments page
  function renderAssignments() {
    const cont = document.getElementById('assignmentsContainer');
    cont.innerHTML = drivers.map(d => {
      const assignedCar = cars.find(c => c.assignedDriver === d.id);
      return `
        <div class="card-item">
          <strong>${d.firstName} ${d.lastName}</strong>
          <select id="carSelect_${d.id}" class="form-input">
            <option value="">-- Select car --</option>
            ${cars.map(c => `<option value="${c.id}" ${c.assignedDriver === d.id ? 'selected' : ''}>${c.name} (${c.plate})</option>`).join('')}
          </select>
          <button class="green-pill-btn" onclick="assignCarToDriver('${d.id}')">Assign</button>
          <button class="green-pill-btn" onclick="suspendDriver('${d.id}')">Suspend</button>
        </div>
      `;
    }).join('');
  }

  window.assignCarToDriver = async function(driverId) {
    const select = document.getElementById(`carSelect_${driverId}`);
    const carId = select.value;
    if (!carId) return;
    // Update car's assignedDriver
    await update(ref(db, `cars/${carId}`), { assignedDriver: driverId });
    // Remove previous assignment if any
    const prevCar = cars.find(c => c.assignedDriver === driverId);
    if (prevCar) await update(ref(db, `cars/${prevCar.id}`), { assignedDriver: null });
    alert('Car assigned');
  };

  window.suspendDriver = function(driverId) {
    update(ref(db, `drivers/${driverId}`), { suspended: true });
    alert('Driver suspended');
  };

  // Reports loading
  document.getElementById('loadReportBtn').addEventListener('click', () => {
    const type = document.getElementById('reportTypeSelect').value;
    const period = document.getElementById('reportPeriodSelect').value;
    // Fetch data accordingly and display table
    // For demo, we'll build a simple table from Firebase
    const container = document.getElementById('reportTableContainer');
    container.innerHTML = `<table class="report-table"><tr><th>Date</th><th>Driver</th><th>Fuel</th><th>Distance</th></tr>`;
    // In real implementation, fetch from Firebase based on type/period
    container.innerHTML += `<tr><td>2026-04-20</td><td>Casey</td><td>45L</td><td>120km</td></tr></table>`;
  });

  // CSV download
  document.getElementById('downloadReportCsv').addEventListener('click', () => {
    let csv = "Date,Driver,Fuel,Distance\n2026-04-20,Casey,45L,120km";
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'report.csv';
    a.click();
  });

  // Page navigation
  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.page;
      document.getElementById(page + 'Page').classList.add('active');
    });
  });

  window.closePageView = function() {
    document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
  };

  // Toggle forms
  document.getElementById('toggleCreateDriverForm').addEventListener('click', () => {
    const form = document.getElementById('createDriverForm');
    form.style.display = form.style.display === 'block' ? 'none' : 'block';
  });
  document.getElementById('toggleAddCarForm').addEventListener('click', () => {
    const form = document.getElementById('addCarForm');
    form.style.display = form.style.display === 'block' ? 'none' : 'block';
  });

  // Create driver (Firebase Auth + DB)
  document.getElementById('createDriverBtn').addEventListener('click', async () => {
    const email = document.getElementById('driverEmail').value;
    const pass = document.getElementById('driverPassword').value;
    const confirm = document.getElementById('driverConfirmPassword').value;
    if (pass !== confirm) return alert('Passwords do not match');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const uid = cred.user.uid;
      await set(ref(db, 'drivers/' + uid), {
        firstName: document.getElementById('driverFirstName').value,
        lastName: document.getElementById('driverLastName').value,
        nrc: document.getElementById('driverNRC').value,
        email: email,
        phone: document.getElementById('driverPhone').value,
        lat: null, lng: null, road: '', city: ''
      });
      alert('Driver created');
      document.getElementById('createDriverForm').style.display = 'none';
      // Sign admin back in
      await signInWithEmailAndPassword(auth, 'admin@monitoring.com', '123456');
    } catch(e) { alert(e.message); }
  });

  // Add car
  document.getElementById('addCarBtn').addEventListener('click', async () => {
    const name = document.getElementById('carName').value;
    const plate = document.getElementById('carPlate').value;
    const newRef = push(ref(db, 'cars'));
    await set(newRef, { name, plate, assignedDriver: null, totalFuelConsumed: 0, totalDistance: 0 });
    document.getElementById('addCarForm').style.display = 'none';
  });

  // Search driver
  document.getElementById('searchDriverInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = drivers.filter(d => (d.firstName+' '+d.lastName).toLowerCase().includes(q));
    const cont = document.getElementById('driversListContainer');
    cont.innerHTML = filtered.map(d => `<div class="card-item" onclick="showDriverDetails('${d.id}')">${d.firstName} ${d.lastName}</div>`).join('');
  });

  // Start app
  initMap();
  loadData();
</script>
</body>
</html>
