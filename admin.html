                                <div class="detail-row"><span class="label">Mileage</span><span class="value">${r.mileageOut || 0} → ${r.mileageParked || 0} km</span></div>
                                <div class="detail-row"><span class="label">Distance</span><span class="value">${r.distanceTraveled || 0} km</span></div>
                                <div class="detail-row"><span class="label">Fuel</span><span class="value">${r.fuelOut || 0} → ${r.fuelParked || 0} L (${r.fuelUsed || 0} L used)</span></div>
                                <div class="detail-row"><span class="label">Hours Out</span><span class="value">${r.hoursOut || 0} hrs</span></div>
                                <div class="detail-row"><span class="label">Revenue</span><span class="value">ZMW ${r.revenue || 0}</span></div>
                                <div class="detail-row"><span class="label">Admin</span><span class="value">${escapeHtml(r.adminName || 'N/A')}</span></div>
                                <div class="detail-row"><span class="label">Comment</span><span class="value">${escapeHtml(r.adminComment || 'No comment')}</span></div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-icon teal" onclick="viewReportDetail('${r.id}')"><i class="fas fa-eye"></i> View</button>
                                <button class="btn-icon blue" onclick="downloadReportCSV('${r.id}')"><i class="fas fa-download"></i> CSV</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        }

        // ==============================================================
        // TAB SWITCHING
        // ==============================================================
        function renderCurrentTab() {
            switch (currentTab) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'stats':
                    renderStats();
                    break;
                case 'vehicles':
                    renderVehicles();
                    break;
                case 'drivers':
                    renderDrivers();
                    break;
                case 'reports':
                    renderReports();
                    break;
                default:
                    renderDashboard();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            const el = document.querySelector(`.nav-item[data-tab="${tab}"]`);
            if (el) el.classList.add('active');
            currentTab = tab;
            searchTerm = '';
            statusFilter = 'all';
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = 'all';
            renderCurrentTab();
            updateStats();
        }

        function setupNavButtons() {
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.dataset.tab;
                    searchTerm = '';
                    statusFilter = 'all';
                    document.getElementById('searchInput').value = '';
                    document.getElementById('statusFilter').value = 'all';
                    renderCurrentTab();
                    updateStats();
                };
            });
        }

        function setupToolbar() {
            document.getElementById('searchInput').oninput = (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderCurrentTab();
            };
            document.getElementById('statusFilter').onchange = (e) => {
                statusFilter = e.target.value;
                renderCurrentTab();
            };
            document.getElementById('refreshBtn').onclick = async () => {
                await refreshAll();
                showToast('Refreshed!', 'success');
            };
        }

        // ==============================================================
        // SHUTDOWN DETECTION
        // ==============================================================
        function setupShutdownListeners() {
            const maintRef = db.ref('maintenance/fleetApp');
            maintRef.on('value', (snap) => {
                if (snap.val() === true) {
                    isShutdown = true;
                    handleShutdown('App under maintenance. Please try again later.');
                } else {
                    isShutdown = false;
                }
            });
            shutdownListeners.push({ ref: maintRef });
        }

        function handleShutdown(msg) {
            showToast(msg, 'error');
            document.getElementById('appShell').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginError').textContent = msg;
            if (currentUser) {
                auth.signOut();
                currentUser = null;
            }
            cleanupShutdownListeners();
        }

        function cleanupShutdownListeners() {
            shutdownListeners.forEach(({ ref, listener }) => {
                try { ref.off('value', listener); } catch (e) {}
            });
            shutdownListeners = [];
        }

        // ==============================================================
        // INIT
        // ==============================================================
        console.log('✅ ZAMLIFT Fleet Management loaded');

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => {
                    m.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            }
        });

        window.addEventListener('beforeunload', () => {
            cleanupShutdownListeners();
        });

        setTimeout(() => {
            if (currentUser) {
                renderDashboard();
            }
        }, 500);
    </script>
</body>
</html>
