<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Monitoring · Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #e9f5ef, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
.login-card {
  width: 100%;
  max-width: 380px;
  background: #ffffff;
  border-radius: 32px;
  padding: 40px 26px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.05);
  text-align: center;
  overflow: hidden;
}

/* HEADER */
h1 {
  font-size: 28px;
  color: #0f3d2e;
  margin-bottom: 10px;
}

.subhead {
  color: #5a7c70;
  margin-bottom: 30px;
}

/* LOGIN BUTTON (FADE IN) */
.tap-login {
  background: #0f3d2e;
  color: white;
  padding: 16px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.8s ease forwards;
  animation-delay: 0.8s;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* DROPDOWN FORM */
.login-dropdown {
  max-height: 0;
  overflow: hidden;
  transition: all 0.5s ease;
}

.login-dropdown.active {
  max-height: 300px;
  margin-top: 20px;
}

/* INPUTS */
.input-group {
  background: #f4f8f6;
  border-radius: 50px;
  padding: 10px 18px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
}

.input-group i {
  color: #7aa395;
  margin-right: 10px;
}

.input-group input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  padding: 10px 0;
}

/* LOGIN BUTTON */
.login-btn {
  width: 100%;
  background: #0f3d2e;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

/* ERROR */
.error-msg {
  color: #b91c1c;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="login-card">

  <h1>Welcome</h1>
  <div class="subhead">Driver Monitoring System</div>

  <div class="tap-login" id="tapLoginBtn">
    Tap to Login
  </div>

  <div class="login-dropdown" id="loginDropdown">

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="emailInput" placeholder="Email" value="admin@monitoring.com">
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="passwordInput" placeholder="Password" value="123456">
    </div>

    <button class="login-btn" id="loginSubmit">Login</button>

    <div class="error-msg" id="loginError"></div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
  authDomain: "monitoring-1a105.firebaseapp.com",
  databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
  projectId: "monitoring-1a105",
  storageBucket: "monitoring-1a105.firebasestorage.app",
  messagingSenderId: "1095363656731",
  appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe",
  measurementId: "G-2CJHNPR6YZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* DROPDOWN ANIMATION */
document.getElementById('tapLoginBtn').addEventListener('click', () => {
  document.getElementById('loginDropdown').classList.toggle('active');
});

/* LOGIN LOGIC (UNCHANGED) */
document.getElementById('loginSubmit').addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.textContent = '';

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    if (user.email.startsWith('admin@')) {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'driver.html';
    }

  } catch (e) {
    errorDiv.textContent = 'Login failed: ' + e.message;
  }
});
</script>

</body>
</html>
