<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Monitoring · Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f0f5fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 36px;
      padding: 36px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
    }
    h1 {
      font-size: 34px;
      font-weight: 700;
      color: #0b2b4a;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .subhead {
      color: #4a6a85;
      margin-bottom: 36px;
      font-weight: 400;
    }
    .tap-login {
      background: white;
      border: 1.5px solid #d0e0ee;
      border-radius: 60px;
      padding: 18px 24px;
      font-weight: 600;
      color: #0b2b4a;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tap-login i {
      margin-right: 8px;
    }
    .login-dropdown {
      background: #fafdff;
      border-radius: 32px;
      padding: 24px 20px;
      margin-top: 20px;
      display: none;
      border: 1px solid #e2eaf2;
    }
    .input-group {
      background: #f5f9ff;
      border-radius: 50px;
      padding: 6px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      border: 1px solid #dae6f0;
    }
    .input-group i {
      color: #6b84a0;
      width: 28px;
    }
    .input-group input {
      background: transparent;
      border: none;
      padding: 16px 0;
      font-size: 16px;
      outline: none;
      width: 100%;
    }
    .login-btn {
      background: #0b2b4a;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-weight: 700;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
    }
    .error-msg {
      color: #c2410c;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-card">
  <h1>Welcome to<br>Driver Daily<br>Monitoring System</h1>
  <div class="subhead">Fleet intelligence</div>
  <div class="tap-login" id="tapLoginBtn">
    <i class="fas fa-chevron-down"></i> Tap to login
  </div>
  <div class="login-dropdown" id="loginDropdown">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="emailInput" placeholder="Email" value="admin@monitoring.com">
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="passwordInput" placeholder="Password" value="123456">
    </div>
    <button class="login-btn" id="loginSubmit">Login →</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
    authDomain: "monitoring-1a105.firebaseapp.com",
    databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
    projectId: "monitoring-1a105",
    storageBucket: "monitoring-1a105.firebasestorage.app",
    messagingSenderId: "1095363656731",
    appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe",
    measurementId: "G-2CJHNPR6YZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('tapLoginBtn').addEventListener('click', () => {
    const dropdown = document.getElementById('loginDropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  });

  document.getElementById('loginSubmit').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = '';

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const user = userCred.user;
      if (user.email.startsWith('admin@')) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'driver.html';
      }
    } catch (e) {
      errorDiv.textContent = 'Login failed: ' + e.message;
    }
  });
</script>
</body>
</html>
