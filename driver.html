<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Driver · Daily Monitoring</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #app {
      max-width: 450px;
      width: 100%;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.02);
    }
    #mapContainer {
      height: 70vh;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    #bottomPanel {
      flex: 1;
      background: #ffffff;
      border-top: 1px solid #e0e8e0;
      display: flex;
      flex-direction: column;
      padding: 16px 14px 20px;
      overflow-y: auto;
    }
    .driver-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .driver-avatar {
      width: 50px;
      height: 50px;
      background: #2e5c3e;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }
    .driver-info h3 {
      color: #1e3a2a;
      font-weight: 700;
    }
    .driver-info p {
      color: #5a7a62;
      font-size: 14px;
    }
    .car-badge {
      background: #f0f7f0;
      border-radius: 30px;
      padding: 10px 18px;
      margin: 8px 0;
      border: 1px solid #c0dcc0;
      color: #1e3a2a;
      font-weight: 500;
      text-align: center;
    }
    .pill-btn {
      background: #2e5c3e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin: 8px 0;
    }
    .outline-btn {
      background: white;
      border: 1.5px solid #2e5c3e;
      color: #2e5c3e;
      border-radius: 40px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin: 8px 0;
    }
    .red-pulse-btn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      margin: 8px 0;
      animation: pulse-red 1.5s infinite;
      box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
      70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }
    .dropdown-form {
      background: #f4f9f4;
      border-radius: 24px;
      padding: 18px;
      margin: 12px 0;
      display: none;
    }
    .form-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 30px;
      border: 1.5px solid #cbdcd0;
      margin-bottom: 12px;
      font-size: 15px;
      background: white;
    }
    .emergency-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
    }
    .emergency-btn {
      background: white;
      border: 1.5px solid #b53b3b;
      border-radius: 30px;
      padding: 12px 4px;
      color: #b53b3b;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
    }
    .emergency-btn i {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-card {
      background: white;
      border-radius: 32px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2e5c3e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Reports Page */
    .page-view {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 150;
      overflow-y: auto;
      padding: 20px 16px 90px;
      display: none;
    }
    .page-view.active { display: block; }
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #2e5c3e;
      cursor: pointer;
    }
    .report-card {
      background: #f8fbf8;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #d0e0d0;
    }
    .report-date {
      font-weight: 700;
      color: #1e3a2a;
      margin-bottom: 8px;
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dashed #c0dcc0;
    }
    .profit-positive {
      color: #2e5c3e;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Map (70%) -->
  <div id="mapContainer"></div>

  <!-- Bottom Panel (30%) -->
  <div id="bottomPanel">
    <div class="driver-header">
      <div class="driver-avatar"><i class="fas fa-user"></i></div>
      <div class="driver-info">
        <h3 id="driverNameDisplay">Loading...</h3>
        <p id="driverEmailDisplay"></p>
      </div>
    </div>

    <div id="assignedCarDisplay" class="car-badge">
      <i class="fas fa-car"></i> <span id="carDetails">No car assigned</span>
    </div>

    <!-- Shift controls -->
    <div id="shiftControlArea">
      <button class="pill-btn" id="startShiftBtn"><i class="fas fa-play"></i> Start Shift</button>
      <div id="startShiftForm" class="dropdown-form">
        <input type="number" id="startFuelInput" class="form-input" placeholder="Starting Fuel (litres)" step="0.1">
        <input type="number" id="fuelMoneyInput" class="form-input" placeholder="Fuel money given (ZMW)" step="10">
        <input type="number" id="foodMoneyInput" class="form-input" placeholder="Food money given (ZMW)" step="10">
        <input type="number" id="extraMoneyInput" class="form-input" placeholder="Extra money (ZMW)" step="10">
        <button class="pill-btn" id="confirmStartShift">Confirm Start Shift</button>
      </div>

      <div id="endShiftSection" style="display:none;">
        <button class="red-pulse-btn" id="endShiftBtn"><i class="fas fa-stop-circle"></i> End Shift</button>
        <div id="endShiftForm" class="dropdown-form">
          <input type="number" id="endFuelInput" class="form-input" placeholder="Ending Fuel (litres)" step="0.1">
          <input type="number" id="distanceInput" class="form-input" placeholder="Distance travelled (km)" step="0.1">
          <input type="number" id="revenueInput" class="form-input" placeholder="Revenue generated (ZMW)" step="10">
          <button class="pill-btn" id="confirmEndShift">Submit & End Shift</button>
        </div>
      </div>
    </div>

    <!-- Emergency buttons -->
    <div style="margin-top: 4px;">
      <div style="font-weight: 600; color: #1e3a2a; margin-bottom: 8px;">⚠️ Emergency</div>
      <div class="emergency-grid">
        <div class="emergency-btn" id="breakdownBtn"><i class="fas fa-tools"></i> Breakdown</div>
        <div class="emergency-btn" id="fuelEmergencyBtn"><i class="fas fa-gas-pump"></i> Fuel</div>
        <div class="emergency-btn" id="otherEmergencyBtn"><i class="fas fa-ambulance"></i> Emergency</div>
      </div>
    </div>

    <!-- My Reports button (navigates to full page) -->
    <button class="outline-btn" id="reportsPageBtn"><i class="fas fa-file-alt"></i> My Reports</button>
    <button class="outline-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<!-- Reports Full Page -->
<div id="reportsPage" class="page-view">
  <div class="page-header">
    <button class="back-btn" id="closeReportsPage"><i class="fas fa-arrow-left"></i></button>
    <h2 style="color:#1e3a2a;">Shift Reports</h2>
  </div>
  <div id="reportsListContainer"></div>
  <button class="pill-btn" id="downloadAllReportsCsv"><i class="fas fa-download"></i> Download CSV</button>
</div>

<!-- Emergency Modal -->
<div class="modal-overlay" id="emergencyModal">
  <div class="modal-card">
    <h3 id="emergencyTitle" style="color:#b53b3b;">Emergency</h3>
    <p id="emergencySubtitle" style="margin-bottom:16px;">Provide additional details</p>
    <textarea id="emergencyMessage" class="form-input" rows="3" placeholder="Describe the situation..."></textarea>
    <button class="pill-btn" id="sendEmergencyBtn" style="background:#b53b3b;">Send Alert</button>
    <button class="outline-btn" onclick="document.getElementById('emergencyModal').style.display='none'">Cancel</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal">
  <div class="modal-card">
    <h3 style="color:#1e3a2a;">Shift Summary</h3>
    <div id="summaryContent"></div>
    <button class="pill-btn" onclick="document.getElementById('summaryModal').style.display='none'">OK</button>
  </div>
</div>

<!-- Spinner Modal -->
<div class="modal-overlay" id="spinnerModal">
  <div class="modal-card" style="text-align:center;">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
    authDomain: "monitoring-1a105.firebaseapp.com",
    databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
    projectId: "monitoring-1a105",
    storageBucket: "monitoring-1a105.firebasestorage.app",
    messagingSenderId: "1095363656731",
    appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let map, driverMarker;
  let currentUser = null, driverData = null, assignedCar = null, currentShift = null;
  let locationWatchId = null;

  // Auth
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (user.email.startsWith('admin@')) { window.location.href = 'admin.html'; return; }
    currentUser = user;
    document.getElementById('driverEmailDisplay').textContent = user.email;
    
    onValue(ref(db, 'drivers/' + user.uid), (snap) => {
      if (snap.exists()) {
        driverData = snap.val();
        document.getElementById('driverNameDisplay').textContent = `${driverData.firstName || ''} ${driverData.lastName || 'Driver'}`;
      }
    });

    initMap();
    startLocationTracking();
    loadAssignedCar();
    checkActiveShift();
  });

  function initMap() {
    map = L.map('mapContainer').setView([-15.3875, 28.3228], 13); // Zambia default
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }

  function startLocationTracking() {
    if (navigator.geolocation) {
      locationWatchId = navigator.geolocation.watchPosition(
        async (pos) => {
          const lat = pos.coords.latitude, lng = pos.coords.longitude;
          if (driverMarker) map.removeLayer(driverMarker);
          driverMarker = L.marker([lat, lng]).addTo(map).bindPopup('You are here');
          map.setView([lat, lng], 18);
          try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await res.json();
            const road = data.address?.road || data.address?.path || 'Unknown';
            const city = data.address?.city || data.address?.town || data.address?.village || 'Unknown';
            if (currentUser) {
              await update(ref(db, 'drivers/' + currentUser.uid), { lat, lng, road, city, lastLocationUpdate: Date.now() });
            }
          } catch (e) {}
        },
        (err) => console.warn(err),
        { enableHighAccuracy: true, maximumAge: 60000 }
      );
    }
    setInterval(() => {
      if (navigator.geolocation) navigator.geolocation.getCurrentPosition(() => {});
    }, 60000);
  }

  function loadAssignedCar() {
    onValue(ref(db, 'cars'), (snap) => {
      const cars = snap.val() ? Object.values(snap.val()) : [];
      assignedCar = cars.find(c => c.assignedDriver === currentUser?.uid);
      document.getElementById('carDetails').innerHTML = assignedCar ? `${assignedCar.name} (${assignedCar.plate})` : 'No car assigned';
    });
  }

  async function checkActiveShift() {
    const snap = await get(ref(db, `activeShifts/${currentUser.uid}`));
    if (snap.exists()) {
      currentShift = snap.val();
      document.getElementById('startShiftBtn').style.display = 'none';
      document.getElementById('endShiftSection').style.display = 'block';
    } else {
      document.getElementById('startShiftBtn').style.display = 'block';
      document.getElementById('endShiftSection').style.display = 'none';
    }
  }

  // Start shift
  document.getElementById('startShiftBtn').addEventListener('click', () => {
    document.getElementById('startShiftForm').style.display = 'block';
  });
  document.getElementById('confirmStartShift').addEventListener('click', async () => {
    const startFuel = parseFloat(document.getElementById('startFuelInput').value);
    if (isNaN(startFuel)) return alert('Enter starting fuel');
    const shiftData = {
      startTime: Date.now(),
      startFuel,
      fuelMoney: parseFloat(document.getElementById('fuelMoneyInput').value) || 0,
      foodMoney: parseFloat(document.getElementById('foodMoneyInput').value) || 0,
      extraMoney: parseFloat(document.getElementById('extraMoneyInput').value) || 0,
      carId: assignedCar?.id || null,
      carName: assignedCar?.name || 'N/A',
      plate: assignedCar?.plate || 'N/A'
    };
    await set(ref(db, `activeShifts/${currentUser.uid}`), shiftData);
    currentShift = shiftData;
    document.getElementById('startShiftForm').style.display = 'none';
    document.getElementById('startShiftBtn').style.display = 'none';
    document.getElementById('endShiftSection').style.display = 'block';
  });

  // End shift
  document.getElementById('endShiftBtn').addEventListener('click', () => {
    document.getElementById('endShiftForm').style.display = 'block';
  });
  document.getElementById('confirmEndShift').addEventListener('click', async () => {
    const endFuel = parseFloat(document.getElementById('endFuelInput').value);
    const distance = parseFloat(document.getElementById('distanceInput').value);
    const revenue = parseFloat(document.getElementById('revenueInput').value);
    if (isNaN(endFuel) || isNaN(distance) || isNaN(revenue)) return alert('Fill all fields');

    document.getElementById('spinnerModal').style.display = 'flex';
    setTimeout(async () => {
      const shift = currentShift;
      const fuelConsumed = shift.startFuel - endFuel;
      const expenses = shift.fuelMoney + shift.foodMoney + shift.extraMoney;
      const profit = revenue - expenses;

      const report = {
        driverId: currentUser.uid,
        driverName: driverData ? `${driverData.firstName} ${driverData.lastName}` : currentUser.email,
        carId: shift.carId, carName: shift.carName, plate: shift.plate,
        startTime: shift.startTime, endTime: Date.now(),
        startFuel: shift.startFuel, endFuel, fuelConsumed, distance, revenue,
        fuelMoney: shift.fuelMoney, foodMoney: shift.foodMoney, extraMoney: shift.extraMoney,
        totalExpenses: expenses, profit,
        timestamp: Date.now()
      };

      await push(ref(db, `shiftReports/${currentUser.uid}`), report);
      await set(ref(db, `activeShifts/${currentUser.uid}`), null);
      
      if (assignedCar) {
        const carRef = ref(db, `cars/${assignedCar.id}`);
        const carSnap = await get(carRef);
        const carData = carSnap.val() || {};
        await update(carRef, {
          totalFuelConsumed: (carData.totalFuelConsumed || 0) + fuelConsumed,
          totalDistance: (carData.totalDistance || 0) + distance
        });
      }

      document.getElementById('spinnerModal').style.display = 'none';
      
      // Summary with ZMW
      document.getElementById('summaryContent').innerHTML = `
        <div class="summary-line"><span>Start fuel:</span><span>${shift.startFuel} L</span></div>
        <div class="summary-line"><span>End fuel:</span><span>${endFuel} L</span></div>
        <div class="summary-line"><span>Fuel consumed:</span><span>${fuelConsumed.toFixed(1)} L</span></div>
        <div class="summary-line"><span>Distance:</span><span>${distance} km</span></div>
        <div class="summary-line"><span>Revenue:</span><span>ZMW ${revenue.toLocaleString()}</span></div>
        <div class="summary-line"><span>Expenses:</span><span>ZMW ${expenses.toLocaleString()}</span></div>
        <div class="summary-line"><span class="profit-positive">Profit:</span><span class="profit-positive">ZMW ${profit.toLocaleString()}</span></div>
      `;
      document.getElementById('summaryModal').style.display = 'flex';
      
      // Reset
      currentShift = null;
      document.getElementById('endShiftForm').style.display = 'none';
      document.getElementById('startShiftBtn').style.display = 'block';
      document.getElementById('endShiftSection').style.display = 'none';
      ['startFuelInput','fuelMoneyInput','foodMoneyInput','extraMoneyInput','endFuelInput','distanceInput','revenueInput'].forEach(id => document.getElementById(id).value = '');
    }, 1500);
  });

  // Emergency with styled modal
  let currentEmergencyType = '';
  function openEmergencyModal(type, title) {
    currentEmergencyType = type;
    document.getElementById('emergencyTitle').innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${title}`;
    document.getElementById('emergencyMessage').value = '';
    document.getElementById('emergencyModal').style.display = 'flex';
  }
  document.getElementById('breakdownBtn').addEventListener('click', () => openEmergencyModal('breakdown', 'Breakdown'));
  document.getElementById('fuelEmergencyBtn').addEventListener('click', () => openEmergencyModal('fuel', 'Fuel Emergency'));
  document.getElementById('otherEmergencyBtn').addEventListener('click', () => openEmergencyModal('emergency', 'Emergency'));
  
  document.getElementById('sendEmergencyBtn').addEventListener('click', async () => {
    const msg = document.getElementById('emergencyMessage').value.trim();
    if (!msg) return alert('Please describe the emergency');
    await push(ref(db, 'driverReports'), {
      driverId: currentUser.uid,
      driverName: driverData ? `${driverData.firstName} ${driverData.lastName}` : currentUser.email,
      type: currentEmergencyType,
      message: msg,
      timestamp: Date.now()
    });
    document.getElementById('emergencyModal').style.display = 'none';
    alert('Emergency sent to admin');
  });

  // Reports page
  document.getElementById('reportsPageBtn').addEventListener('click', async () => {
    document.getElementById('reportsPage').classList.add('active');
    const container = document.getElementById('reportsListContainer');
    container.innerHTML = '<div class="spinner"></div>';
    
    const snap = await get(ref(db, `shiftReports/${currentUser.uid}`));
    const reports = snap.val() ? Object.values(snap.val()) : [];
    reports.sort((a,b) => b.timestamp - a.timestamp);
    
    const formatDate = (ts) => {
      const d = new Date(ts);
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    };
    
    container.innerHTML = reports.map(r => `
      <div class="report-card">
        <div class="report-date">${formatDate(r.startTime)}</div>
        <div><i class="fas fa-car"></i> ${r.carName} (${r.plate})</div>
        <div class="summary-line"><span>Start fuel:</span><span>${r.startFuel} L</span></div>
        <div class="summary-line"><span>End fuel:</span><span>${r.endFuel} L</span></div>
        <div class="summary-line"><span>Fuel used:</span><span>${r.fuelConsumed.toFixed(1)} L</span></div>
        <div class="summary-line"><span>Distance:</span><span>${r.distance} km</span></div>
        <div class="summary-line"><span>Revenue:</span><span>ZMW ${r.revenue.toLocaleString()}</span></div>
        <div class="summary-line"><span>Expenses:</span><span>ZMW ${r.totalExpenses.toLocaleString()}</span></div>
        <div class="summary-line"><span class="profit-positive">Profit:</span><span class="profit-positive">ZMW ${r.profit.toLocaleString()}</span></div>
        <div style="margin-top:8px; font-size:13px; color:#5a7a62;">
          <i class="fas fa-gas-pump"></i> Fuel money: ZMW ${r.fuelMoney} · Food: ZMW ${r.foodMoney} · Extra: ZMW ${r.extraMoney}
        </div>
      </div>
    `).join('') || '<p>No reports yet.</p>';
  });
  
  document.getElementById('closeReportsPage').addEventListener('click', () => {
    document.getElementById('reportsPage').classList.remove('active');
  });

  document.getElementById('downloadAllReportsCsv').addEventListener('click', async () => {
    const snap = await get(ref(db, `shiftReports/${currentUser.uid}`));
    const reports = snap.val() ? Object.values(snap.val()) : [];
    let csv = "Date,Car,Plate,StartFuel,EndFuel,FuelConsumed,Distance,Revenue,Expenses,Profit,FuelMoney,FoodMoney,ExtraMoney\n";
    reports.forEach(r => {
      csv += `"${new Date(r.startTime).toLocaleDateString()}",${r.carName},${r.plate},${r.startFuel},${r.endFuel},${r.fuelConsumed},${r.distance},${r.revenue},${r.totalExpenses},${r.profit},${r.fuelMoney},${r.foodMoney},${r.extraMoney}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `driver_${currentUser.uid}_reports.csv`;
    a.click();
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
    await signOut(auth);
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
