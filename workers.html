<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Worker · Daily Monitoring</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    #app {
      max-width: 450px;
      width: 100%;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.02);
      padding-bottom: 80px;
    }

    /* Off-day fullscreen message */
    .offday-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .offday-message {
      font-size: 24px;
      font-weight: 600;
      color: #dc2626;
      max-width: 350px;
    }

    .offday-message .worker-name {
      color: #2e5c3e;
      font-weight: 700;
    }

    /* Header */
    .worker-header {
      padding: 24px 20px 8px;
      text-align: center;
    }

    .worker-header h2 {
      color: #1e3a2a;
      font-weight: 700;
      font-size: 28px;
    }

    .date-display {
      color: #5a7a62;
      font-size: 16px;
      margin-top: 6px;
    }

    /* Circular Shift Button */
    .shift-circle-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0 20px;
    }

    .shift-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #2e5c3e;
      color: white;
      border: none;
      font-weight: 700;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 10px 25px rgba(46, 92, 62, 0.3);
      transition: transform 0.2s;
    }

    .shift-circle i {
      font-size: 48px;
    }

    .shift-circle.pulse {
      animation: pulse-green 2s infinite;
    }

    .shift-circle.red {
      background: #dc2626;
      box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
    }

    .shift-circle.red.pulse {
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(46, 92, 62, 0.5); }
      70% { box-shadow: 0 0 0 20px rgba(46, 92, 62, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 92, 62, 0); }
    }

    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }

    .shift-timer {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #1e3a2a;
      margin-top: 8px;
    }

    .shift-hint {
      text-align: center;
      color: #6b8a7a;
      font-size: 14px;
      margin-top: 8px;
    }

    /* Bottom navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 450px;
      margin: 0 auto;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 12px 16px 20px;
      border-top: 1px solid #e0e8e0;
    }

    .nav-item {
      text-align: center;
      color: #7e8b9c;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .nav-item.active {
      color: #2e5c3e;
      font-weight: 700;
    }

    .nav-item i {
      font-size: 22px;
      display: block;
      margin-bottom: 4px;
    }

    /* Page views */
    .page-view {
      padding: 8px 16px;
      display: none;
    }

    .page-view.active {
      display: block;
    }

    /* Tasks */
    .task-card {
      background: #f8fbf8;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid #d0e0d0;
    }

    .task-title {
      font-weight: 700;
      color: #1e3a2a;
      font-size: 16px;
    }

    .task-desc {
      color: #4a6a5a;
      margin: 8px 0;
      font-size: 14px;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .task-status {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e0f0e0;
      color: #2e5c3e;
    }

    .expand-btn {
      background: none;
      border: 1px solid #2e5c3e;
      color: #2e5c3e;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
    }

    .task-detail {
      margin-top: 16px;
      display: none;
    }

    .task-summary-input {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid #cbdcd0;
      margin: 10px 0;
      font-size: 14px;
    }

    /* Toggle for Reports */
    .toggle-container {
      display: flex;
      background: #eef3ef;
      border-radius: 40px;
      padding: 4px;
      margin: 16px 0;
    }

    .toggle-option {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      color: #5a7a62;
    }

    .toggle-option.active {
      background: #2e5c3e;
      color: white;
    }

    /* Period selector */
    .period-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .period-pill {
      background: #f0f5f0;
      border: none;
      border-radius: 40px;
      padding: 10px 16px;
      font-weight: 500;
      cursor: pointer;
      flex: 1;
    }

    /* Report cards */
    .report-card {
      background: #f8fbf8;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid #d0e0d0;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #1e3a2a;
      font-weight: 600;
    }

    .report-summary {
      color: #3a5a4a;
      margin: 8px 0;
    }

    .report-tasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #c0dcc0;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-card {
      background: white;
      border-radius: 32px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2e5c3e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 30px;
      border: 1.5px solid #cbdcd0;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .pill-btn {
      background: #2e5c3e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
    }

    .outline-btn {
      background: white;
      border: 1.5px solid #2e5c3e;
      color: #2e5c3e;
      border-radius: 40px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      color: #6b8a7a;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Off-day fullscreen overlay -->
  <div id="offdayFullscreen" class="offday-fullscreen" style="display: none;">
    <div class="offday-message">
      <span id="offdayWorkerName"></span><br>
      Today is your day off.<br>
      Please report early tomorrow.
    </div>
  </div>

  <!-- Home Page -->
  <div id="homePage" class="page-view active">
    <div class="worker-header">
      <h2 id="workerName">Loading...</h2>
      <div class="date-display" id="currentDate"></div>
    </div>

    <div id="shiftSection">
      <div class="shift-circle-container">
        <button class="shift-circle pulse" id="startShiftBtn">
          <i class="fas fa-play"></i>
          <span>Start Shift</span>
        </button>
        <button class="shift-circle red pulse" id="endShiftBtn" style="display:none;">
          <i class="fas fa-stop"></i>
          <span>End Shift</span>
        </button>
      </div>
      <div class="shift-timer" id="shiftTimer" style="display:none;">00:00:00</div>
      <div class="shift-hint" id="shiftHint">Only start when at your workplace</div>
    </div>
  </div>

  <!-- Tasks Page -->
  <div id="tasksPage" class="page-view">
    <h3 style="color:#1e3a2a; margin-bottom:16px;" id="tasksDateTitle"></h3>
    <div id="tasksListContainer"></div>
  </div>

  <!-- Reports Page -->
  <div id="reportsPage" class="page-view">
    <div class="toggle-container">
      <div class="toggle-option active" data-tab="tasks">Completed Tasks</div>
      <div class="toggle-option" data-tab="reports">Shift Reports</div>
    </div>
    <div class="period-selector">
      <select id="periodSelect" class="period-pill">
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <div id="reportsContent"></div>
  </div>

  <!-- Settings Page -->
  <div id="settingsPage" class="page-view">
    <button class="pill-btn" id="logoutBtn" style="margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" data-page="tasks"><i class="fas fa-tasks"></i><span>Tasks</span></div>
    <div class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></div>
    <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span>Settings</span></div>
  </div>
</div>

<!-- End Shift Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal-card">
    <h3 style="color:#1e3a2a; margin-bottom:16px;">Daily Work Summary</h3>
    <textarea id="workSummary" class="form-input" rows="4" placeholder="Describe what you accomplished today..."></textarea>
    <button class="pill-btn" id="submitReportBtn">Submit & End Shift</button>
    <button class="outline-btn" onclick="document.getElementById('reportModal').style.display='none'">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getDatabase, ref, set, push, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkPoi1NX0ERuHOmFcwt6KxF5Ewj4KGZT8",
    authDomain: "monitoring-1a105.firebaseapp.com",
    databaseURL: "https://monitoring-1a105-default-rtdb.firebaseio.com",
    projectId: "monitoring-1a105",
    storageBucket: "monitoring-1a105.firebasestorage.app",
    messagingSenderId: "1095363656731",
    appId: "1:1095363656731:web:6d45d0a49ec2f90cdd8cbe"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;
  let workerData = null;
  let activeShift = null;
  let shiftInterval = null;
  let tasks = [];

  // Auth
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (!user.email.startsWith('worker@')) { window.location.href = 'index.html'; return; }
    currentUser = user;
    await loadWorkerData();
  });

  async function loadWorkerData() {
    const workerRef = ref(db, 'workers/' + currentUser.uid);
    const snap = await get(workerRef);
    if (snap.exists()) {
      workerData = snap.val();
      document.getElementById('workerName').textContent = `Hi, ${workerData.fullName || 'Worker'}`;
      handleOffDay();
    } else {
      workerData = { fullName: 'Worker', offDay: false };
      await set(workerRef, workerData);
      handleOffDay();
    }
    setCurrentDate();
    loadTasks();
    checkActiveShift();
  }

  function handleOffDay() {
    if (workerData.offDay) {
      document.getElementById('offdayFullscreen').style.display = 'flex';
      document.getElementById('offdayWorkerName').innerHTML = `<span class="worker-name">${workerData.fullName}</span>`;
      document.getElementById('shiftSection').style.display = 'none';
      // Disable shift start
    } else {
      document.getElementById('offdayFullscreen').style.display = 'none';
      document.getElementById('shiftSection').style.display = 'block';
    }
  }

  function setCurrentDate() {
    const d = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('currentDate').textContent = d.toLocaleDateString('en-GB', options);
    document.getElementById('tasksDateTitle').textContent = `Today's Tasks · ${d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}`;
  }

  // Shift handling
  async function checkActiveShift() {
    if (workerData.offDay) return;
    const shiftRef = ref(db, `activeShifts/${currentUser.uid}`);
    const snap = await get(shiftRef);
    if (snap.exists()) {
      activeShift = snap.val();
      showActiveShiftUI();
    } else {
      showStartShiftUI();
    }
  }

  function showStartShiftUI() {
    document.getElementById('startShiftBtn').style.display = 'flex';
    document.getElementById('endShiftBtn').style.display = 'none';
    document.getElementById('shiftTimer').style.display = 'none';
    document.getElementById('shiftHint').textContent = 'Only start when at your workplace';
    if (shiftInterval) clearInterval(shiftInterval);
  }

  function showActiveShiftUI() {
    document.getElementById('startShiftBtn').style.display = 'none';
    document.getElementById('endShiftBtn').style.display = 'flex';
    document.getElementById('shiftTimer').style.display = 'block';
    document.getElementById('shiftHint').textContent = 'Shift in progress...';
    startTimer();
  }

  function startTimer() {
    if (shiftInterval) clearInterval(shiftInterval);
    shiftInterval = setInterval(() => {
      if (!activeShift) return;
      const elapsed = Date.now() - activeShift.startTime;
      const h = Math.floor(elapsed / 3600000);
      const m = Math.floor((elapsed % 3600000) / 60000);
      const s = Math.floor((elapsed % 60000) / 1000);
      document.getElementById('shiftTimer').textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }, 1000);
  }

  document.getElementById('startShiftBtn').addEventListener('click', async () => {
    if (workerData.offDay) { alert('You are off duty today.'); return; }
    const shiftData = { startTime: Date.now() };
    await set(ref(db, `activeShifts/${currentUser.uid}`), shiftData);
    activeShift = shiftData;
    showActiveShiftUI();
  });

  document.getElementById('endShiftBtn').addEventListener('click', () => {
    document.getElementById('reportModal').style.display = 'flex';
  });

  document.getElementById('submitReportBtn').addEventListener('click', async () => {
    const summary = document.getElementById('workSummary').value.trim();
    if (!summary) { alert('Please provide a work summary'); return; }

    const endTime = Date.now();
    const completedTasks = tasks.filter(t => t.status === 'completed' && t.completedAt > activeShift.startTime);

    const report = {
      workerId: currentUser.uid,
      workerName: workerData.fullName,
      startTime: activeShift.startTime,
      endTime,
      summary,
      completedTasks: completedTasks.map(t => ({ title: t.title, summary: t.summary || '' })),
      durationMs: endTime - activeShift.startTime,
      timestamp: endTime
    };

    await push(ref(db, `shiftReports/${currentUser.uid}`), report);
    await set(ref(db, `activeShifts/${currentUser.uid}`), null);
    activeShift = null;
    document.getElementById('reportModal').style.display = 'none';
    document.getElementById('workSummary').value = '';
    showStartShiftUI();
  });

  // Tasks
  function loadTasks() {
    const tasksRef = ref(db, `tasks/${currentUser.uid}`);
    onValue(tasksRef, (snap) => {
      tasks = snap.val() ? Object.entries(snap.val()).map(([id, t]) => ({ id, ...t })) : [];
      renderTasks();
    });
  }

  function renderTasks() {
    const container = document.getElementById('tasksListContainer');
    const pending = tasks.filter(t => t.status !== 'completed');
    if (pending.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list" style="font-size:48px; color:#c0dcc0; margin-bottom:16px;"></i><p>Please stand by for tasks</p></div>';
      return;
    }
    container.innerHTML = pending.map(t => `
      <div class="task-card" data-id="${t.id}">
        <div class="task-title">${t.title}</div>
        <div class="task-desc">${t.description || ''}</div>
        <div class="task-meta">
          <span class="task-status">Pending</span>
          <button class="expand-btn"><i class="fas fa-chevron-down"></i> Expand</button>
        </div>
        <div class="task-detail">
          <textarea class="task-summary-input" placeholder="Write summary of completed work..."></textarea>
          <button class="pill-btn mark-done" style="margin-top:8px;">Mark as Done</button>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.expand-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const card = e.target.closest('.task-card');
        const detail = card.querySelector('.task-detail');
        const icon = btn.querySelector('i');
        detail.style.display = detail.style.display === 'block' ? 'none' : 'block';
        icon.className = detail.style.display === 'block' ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
      });
    });

    document.querySelectorAll('.mark-done').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const card = e.target.closest('.task-card');
        const taskId = card.dataset.id;
        const summary = card.querySelector('.task-summary-input').value.trim();
        if (!summary) { alert('Please write a summary'); return; }
        await update(ref(db, `tasks/${currentUser.uid}/${taskId}`), {
          status: 'completed',
          summary,
          completedAt: Date.now()
        });
      });
    });
  }

  // Reports page toggle
  document.querySelectorAll('.toggle-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      loadReportsContent(opt.dataset.tab);
    });
  });

  document.getElementById('periodSelect').addEventListener('change', () => {
    const activeTab = document.querySelector('.toggle-option.active').dataset.tab;
    loadReportsContent(activeTab);
  });

  async function loadReportsContent(tab) {
    const container = document.getElementById('reportsContent');
    const period = document.getElementById('periodSelect').value;
    container.innerHTML = '<div class="spinner"></div>';

    const now = Date.now();
    const day = 86400000;

    if (tab === 'tasks') {
      const completed = tasks.filter(t => t.status === 'completed');
      const filtered = completed.filter(t => {
        if (period === 'today') return (now - t.completedAt) < day;
        if (period === 'week') return (now - t.completedAt) < 7 * day;
        if (period === 'month') return (now - t.completedAt) < 30 * day;
        return true;
      });
      filtered.sort((a, b) => b.completedAt - a.completedAt);
      container.innerHTML = filtered.length === 0 ? '<div class="empty-state">No completed tasks in this period</div>' : filtered.map(t => `
        <div class="report-card">
          <div class="report-header">
            <span>${t.title}</span>
            <span>${new Date(t.completedAt).toLocaleDateString()}</span>
          </div>
          <div class="report-summary">${t.summary || 'No summary'}</div>
        </div>
      `).join('');
    } else {
      const snap = await get(ref(db, `shiftReports/${currentUser.uid}`));
      const reports = snap.val() ? Object.values(snap.val()) : [];
      const filtered = reports.filter(r => {
        if (period === 'today') return (now - r.timestamp) < day;
        if (period === 'week') return (now - r.timestamp) < 7 * day;
        if (period === 'month') return (now - r.timestamp) < 30 * day;
        return true;
      });
      filtered.sort((a, b) => b.timestamp - a.timestamp);
      container.innerHTML = filtered.length === 0 ? '<div class="empty-state">No shift reports in this period</div>' : filtered.map(r => `
        <div class="report-card">
          <div class="report-header">
            <span>${new Date(r.startTime).toLocaleDateString()}</span>
            <span>${formatTime(r.startTime)} - ${formatTime(r.endTime)}</span>
          </div>
          <div class="report-summary">${r.summary}</div>
          ${r.completedTasks && r.completedTasks.length ? `
            <div class="report-tasks">
              <strong>Completed Tasks:</strong>
              ${r.completedTasks.map(t => `<div style="margin-top:6px;">• ${t.title}: ${t.summary}</div>`).join('')}
            </div>
          ` : ''}
          <div style="margin-top:8px; font-size:13px; color:#5a7a62;">Duration: ${formatDuration(r.durationMs)}</div>
        </div>
      `).join('');
    }
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatDuration(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `${h}h ${m}m`;
  }

  // Navigation
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const page = item.dataset.page;
      document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
      document.getElementById(page + 'Page').classList.add('active');
      if (page === 'reports') loadReportsContent('tasks');
    });
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'index.html'));
</script>
</body>
</html>
